# Handle AREK API routes -> backend on port 8081
location /AREK/api/ {
    proxy_request_buffering off;
    proxy_pass http://localhost:8081/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400;
    proxy_connect_timeout 60s;
    proxy_send_timeout 86400;

    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
}

# Handle AREK public files -> backend static /public
location /AREK/public/ {
    proxy_pass http://localhost:8081/public/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300;

    expires 1h;
    add_header Cache-Control "public, no-transform";
}

# Frontend app static files (separate dist directory)
location /AREK/ {
    alias /data/AREK_PROD/;
    try_files $uri $uri/ @arek_fallback;
}

location @arek_fallback {
    rewrite ^/AREK/.*$ /AREK/index.html last;
}
